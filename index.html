<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>راديو وتلفزيون أنيس - النسخة الذكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الخلفية والتصميم الغامق */
        body { 
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #0b1121; 
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* حاوية المشغل */
        .player-container { 
            background-color: #1e2532; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 1px solid #2a3441;
        }

        /* الدائرة اللي فيها اسم الراديو/القناة */
        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4776E6, #8E54E9);
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            border: 6px solid #2c3647;
            box-shadow: 0 0 20px rgba(71, 118, 230, 0.4);
            transition: all 0.3s ease;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            line-height: 1.3;
        }

        /* تنسيق القائمة المنسدلة */
        .station-selector {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            background-color: #2a3441;
            color: white;
            border: 1px solid #4776E6;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 25px;
            outline: none;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: left 10px center; 
        }

        .station-selector optgroup {
            background-color: #1e2532;
            color: #a0aec0;
            font-weight: bold;
        }

        .station-selector option {
            background-color: #2a3441;
            color: white;
        }

        /* تنسيق مشغل الصوت */
        audio { 
            width: 100%; 
            border-radius: 30px;
            outline: none;
            background-color: #2a3441;
        }

        /* تنسيق شاشة الفيديو (مخفية في البداية) */
        #videoFrame {
            width: 100%;
            height: 230px;
            border-radius: 15px;
            border: none;
            background-color: #000;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* رسالة الحالة */
        #statusMessage {
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            background: #2a3441;
            display: none;
        }
    </style>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="./manifest.json?v=v1781724144952">
    <meta name="theme-color" content="#7b5ed5">
    <link rel="apple-touch-icon" href="./icon-192.png?v=v1781724144952">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js?v=v1781724144952')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed', err));
        });
      }
    </script>
</head>
<body>

    <div class="player-container">
        
        <div class="logo-circle" id="logoText">📺 OMAR FM</div>
        
        <p style="color: #a0aec0; margin-bottom: 10px; font-size: 14px;">اختار البث أو المباراة</p>
        
        <select class="station-selector" id="stationSelect" onchange="changeStation()">
            <option value="" disabled selected>-- اضغط هنا للاختيار --</option>
            
            <optgroup label="🕋 القرآن الكريم">
                <option value="https://stream.radiojar.com/8s5u5tpdtwzuv" data-type="audio">إذاعة القرآن الكريم</option>
            </optgroup>

            <optgroup label="⚽ صوتيات بين سبورت Max">
                <option value="https://bein.trystra.xyz/islam_max1" data-type="audio">صوتية بين سبورت 1 (Max 1)</option>
                <option value="https://bein.trystra.xyz/islam_max2" data-type="audio">صوتية بين سبورت 2 (Max 2)</option>
                <option value="https://bein.trystra.xyz/islam_max3" data-type="audio">صوتية بين سبورت 3 (Max 3)</option>
                <option value="https://bein.trystra.xyz/islam_max4" data-type="audio">صوتية بين سبورت 4 (Max 4)</option>
            </optgroup>

            <optgroup label="🎙️ إذاعات أنيس (HTTPS - جودة عالية)">
                <option value="https://anisfm.pp.ua/1" data-type="audio">Anis1 (HTTPS)</option>
                <option value="https://anisfm.pp.ua/2" data-type="audio">Anis2 (HTTPS)</option>
                <option value="https://anisfm.pp.ua/3" data-type="audio">Anis3 (HTTPS)</option>
                <option value="https://anisfm.pp.ua/4" data-type="audio">Anis4 (HTTPS)</option>
                <option value="https://anisfm.pp.ua/5" data-type="audio">Anis5 (HTTPS)</option>
            </optgroup>

            <optgroup label="🎙️ إذاعات أنيس (HTTP - جودة عالية)">
                <option value="http://anisfm.pp.ua/1" data-type="audio">Anis1 (HTTP)</option>
                <option value="http://anisfm.pp.ua/2" data-type="audio">Anis2 (HTTP)</option>
                <option value="http://anisfm.pp.ua/3" data-type="audio">Anis3 (HTTP)</option>
                <option value="http://anisfm.pp.ua/4" data-type="audio">Anis4 (HTTP)</option>
                <option value="http://anisfm.pp.ua/5" data-type="audio">Anis5 (HTTP)</option>
            </optgroup>

            <optgroup label="📡 إذاعات أنيس (جودة ضعيفة)">
                <option value="https://anisfm.pp.ua/1L" data-type="audio">Anis1Low (HTTPS)</option>
                <option value="http://anisfm.pp.ua/1L" data-type="audio">Anis1Low (HTTP)</option>
                <option value="https://anisfm.pp.ua/2L" data-type="audio">Anis2Low (HTTPS)</option>
                <option value="http://anisfm.pp.ua/2L" data-type="audio">Anis2Low (HTTP)</option>
                <option value="https://anisfm.pp.ua/3L" data-type="audio">Anis3Low (HTTPS)</option>
                <option value="http://anisfm.pp.ua/3L" data-type="audio">Anis3Low (HTTP)</option>
                <option value="https://anisfm.pp.ua/4L" data-type="audio">Anis4Low (HTTPS)</option>
                <option value="http://anisfm.pp.ua/4L" data-type="audio">Anis4Low (HTTP)</option>
                <option value="https://anisfm.pp.ua/5L" data-type="audio">Anis5Low (HTTPS)</option>
                <option value="http://anisfm.pp.ua/5L" data-type="audio">Anis5Low (HTTP)</option>
            </optgroup>

            <optgroup label="🌟 إذاعات أنيس (Max)">
                <option value="https://anisfm.pp.ua/Mx1" data-type="audio">AnisMax1 (HTTPS)</option>
                <option value="http://anisfm.pp.ua/Mx1" data-type="audio">AnisMax1 (HTTP)</option>
                <option value="https://anisfm.pp.ua/Mx2" data-type="audio">AnisMax2 (HTTPS)</option>
                <option value="http://anisfm.pp.ua/Mx2" data-type="audio">AnisMax2 (HTTP)</option>
                <option value="https://anisfm.pp.ua/MxFR" data-type="audio">AnisMax3 (HTTPS)</option>
                <option value="http://anisfm.pp.ua/MxFR" data-type="audio">AnisMax3 (HTTP)</option>
            </optgroup>
        </select>

        <audio id="audioPlayer" controls style="display: none;" src=""></audio>
        
        <iframe id="videoFrame" allow="autoplay; fullscreen" style="display: none;" src=""></iframe>
        
        <div id="statusMessage"></div>
    </div>

    <script>
        var player = document.getElementById('audioPlayer');
        var videoFrame = document.getElementById('videoFrame');
        var statusMsg = document.getElementById('statusMessage');
        var logoText = document.getElementById('logoText');
        var selector = document.getElementById('stationSelect');

        function changeStation() {
            var selectedOption = selector.options[selector.selectedIndex];
            var streamUrl = selectedOption.value;
            var dataType = selectedOption.getAttribute('data-type');
            var stationName = selectedOption.text;
            
            // إيقاف أي صوت شغال قبل تحميل الجديد للضمان
            player.pause();
            
            // تحديث اسم الدائرة وتصغير الخط لو الاسم طويل
            if(stationName.length > 15) {
                logoText.style.fontSize = "14px";
            } else {
                logoText.style.fontSize = "20px";
            }
            logoText.innerText = stationName;

            statusMsg.style.display = 'block';

            if (dataType === 'link') {
                player.style.display = 'none'; 
                videoFrame.style.display = 'none'; 
                
                window.open(streamUrl, '_blank'); 
                
                statusMsg.style.color = '#3498db'; 
                statusMsg.innerHTML = '🌐 تم فتح الموقع في صفحة جديدة.';
                logoText.style.boxShadow = "0 0 20px rgba(52, 152, 219, 0.4)";
                logoText.style.border = "6px solid #3498db";
                
                selector.selectedIndex = 0; 
            } 
            else if (dataType === 'iframe') {
                player.style.display = 'none'; 
                
                videoFrame.src = streamUrl; 
                videoFrame.style.display = 'block'; 
                
                statusMsg.style.color = '#9b59b6'; 
                statusMsg.innerHTML = '📺 جاري عرض الفيديو...';
                logoText.style.boxShadow = "0 0 20px rgba(155, 89, 182, 0.4)";
                logoText.style.border = "6px solid #9b59b6";
            } 
            else {
                videoFrame.src = ""; 
                videoFrame.style.display = 'none'; 
                player.style.display = 'block'; 
                
                statusMsg.style.color = '#f1c40f'; 
                statusMsg.innerHTML = '⏳ بيحمل...';
                
                player.src = streamUrl;
                player.play().catch(function() {
                    statusMsg.style.color = '#e74c3c'; 
                    statusMsg.innerHTML = '❌ دوس Play للتشغيل';
                });
            }
        }

        player.onplaying = function() {
            statusMsg.style.color = '#2ecc71'; 
            statusMsg.innerHTML = '🎵 البث شغال دلوقتي!';
            logoText.style.boxShadow = "0 0 30px rgba(46, 204, 113, 0.6)"; 
            logoText.style.border = "6px solid #2ecc71";
        };

        player.onpause = function() {
            statusMsg.style.color = '#a0aec0'; 
            statusMsg.innerHTML = '⏸️ البث متوقف';
            logoText.style.boxShadow = "0 0 20px rgba(71, 118, 230, 0.4)"; 
            logoText.style.border = "6px solid #2c3647";
        };

        player.onerror = function() {
            statusMsg.style.color = '#e74c3c';
            statusMsg.innerHTML = '❌ البث ده قاطع من المصدر أو غير مدعوم حالياً.';
            logoText.style.border = "6px solid #e74c3c";
        };
    </script>
</body>
</html>
